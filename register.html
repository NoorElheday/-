<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - موقع نُور</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d5a27;
            --gold: #d4af37;
            --bg-light: #f4f7f4;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3d1a 0%, #2d5a27 100%);
            overflow: hidden;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Amiri', serif;
            color: var(--primary);
            font-size: 30px;
            margin-bottom: 10px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            font-family: 'Tajawal';
            box-sizing: border-box;
            background: var(--bg-light);
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            background: #fff;
        }

        .btn-register {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 25px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: var(--gold);
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <i class="fa-solid fa-user-plus" style="font-size: 40px; color: var(--gold); margin-bottom: 15px;"></i>
        <h2>إنشاء حساب جديد</h2>
        <p style="color: #888; margin-bottom: 25px;">انضم إلينا في رحلة إيمانية مباركة</p>

        <form id="regForm">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="الاسم الكامل" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="كلمة المرور" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-shield-check"></i>
                <input type="password" placeholder="تأكيد كلمة المرور" required>
            </div>

            <button type="submit" class="btn-register">إنشاء الحساب</button>
        </form>

        <div class="footer-text">
            لديك حساب بالفعل؟ <a href="index.html">سجل دخولك هنا</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("تم إنشاء حسابك بنجاح! يمكنك الآن تسجيل الدخول.");
            window.location.href = "index.html"; // العودة لصفحة الدخول
        });
    </script>

</body>
</html>
