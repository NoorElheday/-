<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - موقع نُور</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center;
               background: linear-gradient(-45deg, #2d5a27, #1e3d1a, #4a7c44, #2d5a27); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 400px; text-align: center; }
        h2 { font-family: 'Amiri', serif; color: var(--primary); font-size: 32px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 25px; border: 1px solid #ddd; outline: none; box-sizing: border-box; text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <h2>نُور الهداية</h2>
        <p>مرحباً بك في موقعك الإسلامي</p>
        <form onsubmit="event.preventDefault(); window.location.href='./index.html';">
            <input type="text" placeholder="اسم المستخدم" required>
            <input type="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">دخول للموقع</button>
        </form>
    </div>
</body>
</html>
