<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - موقع نُور</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; --bg: #fdfbf7; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 50px; }

        .quran-header { background: var(--primary); color: white; padding: 30px; text-align: center; border-radius: 0 0 40px 40px; }
        
        /* قسم علامات الوقف */
        .waqf-guide { 
            max-width: 900px; margin: 20px auto; background: white; padding: 15px; 
            border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid var(--gold);
        }
        .waqf-item { font-size: 14px; color: #555; }
        .waqf-item b { color: var(--gold); font-size: 18px; margin-left: 5px; }

        /* حاوية السور والفهرس */
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .surah-select { 
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--primary); 
            font-family: 'Tajawal'; font-size: 18px; margin-bottom: 30px; outline: none;
        }

        .quran-display { 
            background: white; padding: 40px; border-radius: 20px; border: 10px double var(--primary); 
            min-height: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        .surah-name { font-family: 'Amiri', serif; font-size: 40px; color: var(--primary); text-align: center; margin-bottom: 20px; }
        .quran-text { 
            font-family: 'Amiri', serif; font-size: 32px; line-height: 2.3; text-align: center; 
            color: #222; direction: rtl;
        }

        .ayah-num { color: var(--gold); font-size: 24px; font-weight: bold; margin: 0 5px; }
        .loading { display: none; text-align: center; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

<div class="quran-header">
    <h1 style="font-family: 'Amiri', serif;">المصحف الإلكتروني</h1>
    <p>بالخط العثماني وتوضيح علامات الوقف</p>
</div>

<div class="waqf-guide">
    <div class="waqf-item"><b>م</b> وقف لازم</div>
    <div class="waqf-item"><b>لا</b> ممنوع الوقف</div>
    <div class="waqf-item"><b>ج</b> جائز مستوي الطرفين</div>
    <div class="waqf-item"><b>صلى</b> الوصل أولى</div>
    <div class="waqf-item"><b>قلى</b> الوقف أولى</div>
    <div class="waqf-item"><b>∴ ∴</b> تعانق الوقف</div>
</div>

<div class="container">
    <select id="surahList" class="surah-select" onchange="loadSurah()">
        <option value="">-- اختر السورة --</option>
    </select>

    <div id="loader" class="loading">جاري تحميل كلام الله...</div>

    <div class="quran-display" id="quranBox">
        <div class="surah-name" id="sName">اختر سورة للبدء</div>
        <div class="quran-text" id="sText">
            (سيظهر نص السورة هنا بالخط العثماني مع علامات الوقف)
        </div>
    </div>
</div>

<script>
    const surahList = document.getElementById('surahList');
    const sName = document.getElementById('sName');
    const sText = document.getElementById('sText');
    const loader = document.getElementById('loader');

    // جلب قائمة السور (114 سورة)
    async function init() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(surah => {
                let opt = document.createElement('option');
                opt.value = surah.number;
                opt.innerText = surah.number + ". " + surah.name;
                surahList.appendChild(opt);
            });
        } catch (e) { alert("خطأ في الاتصال بالقاعدة"); }
    }

    // جلب السورة المختارة بنصها العثماني
    async function loadSurah() {
        const num = surahList.value;
        if(!num) return;

        loader.style.display = "block";
        sText.innerText = "";
        
        try {
            // نستخدم نسخة quran-uthmani لجلب علامات الوقف والخط العثماني
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`);
            const data = await res.json();
            
            sName.innerText = "سُورَةُ " + data.data.name;
            let fullText = "";
            
            data.data.ayahs.forEach(ayah => {
                fullText += ayah.text + ` <span class="ayah-num">﴿${ayah.numberInSurah}﴾</span> `;
            });
            
            sText.innerHTML = fullText;
        } catch (e) {
            sText.innerText = "حدث خطأ أثناء تحميل السورة.";
        } finally {
            loader.style.display = "none";
        }
    }

    init();
</script>

</body>
</html>
