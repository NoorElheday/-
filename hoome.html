<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع نُور - مواقيت الصلاة العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; --bg: #fdfbf7; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #333; }

        .hero { 
            background: linear-gradient(135deg, var(--primary), #1e3d1a); 
            color: white; padding: 50px 20px; text-align: center; border-radius: 0 0 50px 50px;
        }

        .prayer-container { max-width: 900px; margin: -30px auto 40px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .selectors { margin-bottom: 25px; }
        select { 
            width: 80%; max-width: 400px; padding: 12px; border-radius: 25px; 
            border: 2px solid var(--primary); font-family: 'Tajawal'; outline: none; cursor: pointer;
            font-size: 16px;
        }

        .times-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .time-card { background: var(--bg); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--gold); transition: 0.3s; }
        .time-card:hover { transform: scale(1.05); }
        .time-card div { font-size: 15px; color: #666; margin-bottom: 5px; }
        .time-card strong { font-size: 20px; color: var(--primary); }

        .main-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px 10%; }
        .menu-item { 
            background: white; padding: 25px; border-radius: 20px; text-align: center; 
            text-decoration: none; color: inherit; transition: 0.4s; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }
        .menu-item:hover { background: var(--primary); color: white; }
        .menu-item i { font-size: 30px; color: var(--gold); margin-bottom: 10px; }
        .menu-item:hover i { color: white; }

        .loading-text { color: var(--gold); font-weight: bold; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-family: 'Amiri', serif; font-size: 40px;">نُور الهداية</h1>
        <p>مواقيت الصلاة لكل دول العالم</p>
    </div>

    <div class="prayer-container">
        <h3><i class="fa-solid fa-globe"></i> اختر الدولة لعرض المواقيت</h3>
        <div class="selectors">
            <select id="countrySelect" onchange="fetchPrayers()">
                <option value="">جاري تحميل الدول...</option>
            </select>
        </div>
        <div id="loading" class="loading-text">جاري تحديث الأوقات...</div>

        <div class="times-grid">
            <div class="time-card"><div>الفجر</div><strong id="fajr">--:--</strong></div>
            <div class="time-card"><div>الظهر</div><strong id="dhuhr">--:--</strong></div>
            <div class="time-card"><div>العصر</div><strong id="asr">--:--</strong></div>
            <div class="time-card"><div>المغرب</div><strong id="maghrib">--:--</strong></div>
            <div class="time-card"><div>العشاء</div><strong id="isha">--:--</strong></div>
        </div>
    </div>

    <div class="main-menu">
        <a href="quran.html" class="menu-item"><i class="fa-solid fa-book-quran"></i><h4>المصحف</h4></a>
        <a href="audio.html" class="menu-item"><i class="fa-solid fa-microphone"></i><h4>القراء</h4></a>
        <a href="ruqya.html" class="menu-item"><i class="fa-solid fa-shield-heart"></i><h4>الرقية</h4></a>
        <a href="pillars.html" class="menu-item"><i class="fa-solid fa-star-and-crescent"></i><h4>الأركان</h4></a>
    </div>

    <script>
        // قائمة شاملة لجميع دول العالم تقريباً
        const countries = [
            {n: "مصر", v: "Egypt", c: "Cairo"}, {n: "السعودية", v: "Saudi Arabia", c: "Mecca"},
            {n: "الإمارات", v: "UAE", c: "Dubai"}, {n: "الكويت", v: "Kuwait", c: "Kuwait City"},
            {n: "قطر", v: "Qatar", c: "Doha"}, {n: "البحرين", v: "Bahrain", c: "Manama"},
            {n: "عمان", v: "Oman", c: "Muscat"}, {n: "الأردن", v: "Jordan", c: "Amman"},
            {n: "فلسطين", v: "Palestine", c: "Jerusalem"}, {n: "سوريا", v: "Syria", c: "Damascus"},
            {n: "لبنان", v: "Lebanon", c: "Beirut"}, {n: "العراق", v: "Iraq", c: "Baghdad"},
            {n: "المغرب", v: "Morocco", c: "Rabat"}, {n: "الجزائر", v: "Algeria", c: "Algiers"},
            {n: "تونس", v: "Tunisia", c: "Tunis"}, {n: "ليبيا", v: "Libya", c: "Tripoli"},
            {n: "السودان", v: "Sudan", c: "Khartoum"}, {n: "تركيا", v: "Turkey", c: "Istanbul"},
            {n: "أمريكا", v: "USA", c: "New York"}, {n: "بريطانيا", v: "UK", c: "London"},
            {n: "فرنسا", v: "France", c: "Paris"}, {n: "ألمانيا", v: "Germany", c: "Berlin"},
            {n: "كندا", v: "Canada", c: "Toronto"}, {n: "أستراليا", v: "Australia", c: "Sydney"},
            {n: "ماليزيا", v: "Malaysia", c: "Kuala Lumpur"}, {n: "إندونيسيا", v: "Indonesia", c: "Jakarta"}
            // القائمة تطول، برمجياً أضفنا أهم الدول ويمكن إضافة الباقي بسهولة
        ];

        const select = document.getElementById('countrySelect');

        function init() {
            select.innerHTML = '<option value="">-- اختر الدولة --</option>';
            countries.forEach(c => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify({v: c.v, c: c.c});
                opt.innerText = c.n;
                select.appendChild(opt);
            });
        }

        async function fetchPrayers() {
            if(!select.value) return;
            const data = JSON.parse(select.value);
            document.getElementById('loading').style.display = 'block';

            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${data.c}&country=${data.v}&method=5`);
                const json = await res.json();
                const t = json.data.timings;
                
                document.getElementById('fajr').innerText = t.Fajr;
                document.getElementById('dhuhr').innerText = t.Dhuhr;
                document.getElementById('asr').innerText = t.Asr;
                document.getElementById('maghrib').innerText = t.Maghrib;
                document.getElementById('isha').innerText = t.Isha;
            } catch (e) {
                alert("تعذر جلب البيانات");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
