<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الصوتية - موقع نُور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a3c15; --gold: #c5a02d; --bg: #f4f1ea; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 130px; }
        .header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .selector-box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        select { width: 100%; max-width: 400px; padding: 12px; border-radius: 20px; border: 2px solid var(--primary); font-family: 'Tajawal'; outline: none; }
        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .surah-card { background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .play-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .footer-player { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 4px solid var(--gold); text-align: center; z-index: 100; }
        #now-playing { font-weight: bold; color: var(--primary); margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="header"><h1>المكتبة الصوتية</h1></div>
    <div class="container">
        <div class="selector-box">
            <label>اختر القارئ:</label><br><br>
            <select id="qariSelect" onchange="loadSurahs()">
                <option value="https://server13.mp3quran.net/husr/">محمود خليل الحصري</option>
                <option value="https://server7.mp3quran.net/basit/MTL/">عبد الباسط عبد الصمد</option>
                <option value="https://server10.mp3quran.net/minsh/">محمد صديق المنشاوي</option>
                <option value="https://server8.mp3quran.net/afs/">مشاري العفاسي</option>
                <option value="https://server12.mp3quran.net/maher/">ماهر المعيقلي</option>
                <option value="https://server11.mp3quran.net/yasser/">ياسر الدوسري (تم التحديث)</option>
                <option value="https://server8.mp3quran.net/frs_a/">فارس عباد</option>
                <option value="https://server10.mp3quran.net/ajm/">أحمد العجمي</option>
                <option value="https://server6.mp3quran.net/idrees/">إدريس أبكر</option>
                <option value="https://server6.mp3quran.net/qtm/">ناصر القطامي</option>
            </select>
        </div>
        <div class="surah-grid" id="grid"></div>
    </div>
    <div class="footer-player">
        <div id="now-playing">اختر سورة للاستماع</div>
        <audio id="mainAudio" controls style="width: 90%;"></audio>
    </div>

</body>
</html>
